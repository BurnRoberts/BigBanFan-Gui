name: Release

# Fires when you push a tag like: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

# Needs write access to create the GitHub release and upload assets
permissions:
  contents: write

jobs:
  # ── Linux (native build on ubuntu runner) ────────────────────────────────────
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install WebKit2GTK 4.1 (required by build tag webkit2_4_1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # Wails v2.11.0 hardcodes webkit2gtk-4.0 in some cgo directives.
          # Ubuntu 22.04+ only ships 4.1. Create a user-level alias so both resolve.
          mkdir -p ~/.local/lib/pkgconfig
          ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
                 ~/.local/lib/pkgconfig/webkit2gtk-4.0.pc

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        run: |
          PKG_CONFIG_PATH="$HOME/.local/lib/pkgconfig" \
          wails build \
            -platform linux/amd64 \
            -clean \
            -trimpath \
            -tags webkit2_4_1 \
            -ldflags "-X 'main.version=${{ github.ref_name }}'" \
            -o bigbanfan-gui-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/bin/bigbanfan-gui-linux-amd64

  # ── Windows (cross-compile on windows runner) ─────────────────────────────────
  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        run: |
          wails build `
            -platform windows/amd64 `
            -clean `
            -trimpath `
            -ldflags "-X 'main.version=${{ github.ref_name }}'" `
            -o bigbanfan-gui-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/bin/bigbanfan-gui-windows-amd64.exe

  # ── macOS (universal binary: Intel + Apple Silicon) ───────────────────────────
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        run: |
          wails build \
            -platform darwin/universal \
            -clean \
            -trimpath \
            -ldflags "-X 'main.version=${{ github.ref_name }}'" \
            -o bigbanfan-gui-macos

      # Wails names the .app bundle from wails.json outputfilename, not the -o flag.
      # Use *.app wildcard to capture it regardless of the name.
      - name: Zip macOS bundle
        run: |
          cd build/bin
          zip -r bigbanfan-gui-macos-universal.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/bin/bigbanfan-gui-macos-universal.zip

  # ── Publish Release ──────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/bigbanfan-gui-linux-amd64
            release-assets/bigbanfan-gui-windows-amd64.exe
            release-assets/bigbanfan-gui-macos-universal.zip
